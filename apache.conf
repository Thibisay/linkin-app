<VirtualHost *:80>
    ServerName localhost

    # Sirve los archivos estáticos directamente desde Apache
    Alias /static/ /usr/local/apache2/htdocs/static/
    <Directory /usr/local/apache2/htdocs/static/>
        Options -Indexes
        Require all granted
    </Directory>

    # Todo lo demás va al contenedor web (Gunicorn)
    ProxyPreserveHost On
    ProxyPass /static/ !
    ProxyPass / http://web:8000/
    ProxyPassReverse / http://web:8000/

    ErrorLog /usr/local/apache2/logs/error.log
    CustomLog /usr/local/apache2/logs/access.log combined
</VirtualHost>
